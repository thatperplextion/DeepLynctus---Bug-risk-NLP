<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#grad)"/>
  
  <!-- Brain emoji substitute - stylized brain icon -->
  <g transform="translate(64, 64)">
    <!-- Left hemisphere -->
    <path d="M -25,-15 Q -35,-15 -35,-5 Q -35,5 -30,10 Q -25,15 -15,15 L -5,15 Q -5,10 -10,5 Q -15,0 -15,-10 Q -15,-15 -20,-15 Z" 
          fill="white" opacity="0.95"/>
    
    <!-- Right hemisphere -->
    <path d="M 5,15 L 15,15 Q 25,15 30,10 Q 35,5 35,-5 Q 35,-15 25,-15 L 20,-15 Q 15,-15 15,-10 Q 15,0 10,5 Q 5,10 5,15 Z" 
          fill="white" opacity="0.95"/>
    
    <!-- Brain details -->
    <path d="M -20,-5 Q -15,-8 -10,-5" stroke="url(#grad)" stroke-width="2" fill="none" opacity="0.8"/>
    <path d="M 10,-5 Q 15,-8 20,-5" stroke="url(#grad)" stroke-width="2" fill="none" opacity="0.8"/>
    <path d="M -15,5 Q -10,2 -5,5" stroke="url(#grad)" stroke-width="2" fill="none" opacity="0.8"/>
    <path d="M 5,5 Q 10,2 15,5" stroke="url(#grad)" stroke-width="2" fill="none" opacity="0.8"/>
  </g>
  
  <!-- Sparkle effect -->
  <circle cx="25" cy="25" r="3" fill="white" opacity="0.8"/>
  <circle cx="103" cy="35" r="2" fill="white" opacity="0.8"/>
  <circle cx="95" cy="95" r="3" fill="white" opacity="0.8"/>
</svg>