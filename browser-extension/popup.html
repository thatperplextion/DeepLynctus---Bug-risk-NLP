<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Deep Lynctus</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 380px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
      padding: 0;
    }

    .header {
      background: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 100%);
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      color: white;
      margin-bottom: 5px;
    }

    .header p {
      font-size: 12px;
      color: rgba(255,255,255,0.9);
    }

    .container {
      padding: 20px;
    }

    .status {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .status-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .status-icon {
      font-size: 24px;
    }

    .status-text {
      flex: 1;
    }

    .status-text h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .status-text p {
      font-size: 12px;
      color: #94a3b8;
    }

    .repo-url {
      background: rgba(255,255,255,0.05);
      padding: 10px;
      border-radius: 8px;
      font-size: 12px;
      word-break: break-all;
      margin-bottom: 15px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .btn {
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 10px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 100%);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(139, 92, 246, 0.3);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.05);
      color: #e2e8f0;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .btn-secondary:hover:not(:disabled) {
      background: rgba(255,255,255,0.1);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 20px;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: #06b6d4;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .results {
      display: none;
      margin-top: 20px;
    }

    .results.show {
      display: block;
    }

    .metric-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .metric-label {
      font-size: 11px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .metric-value {
      font-size: 20px;
      font-weight: 700;
      color: #06b6d4;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 15px;
    }

    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      padding: 12px;
      border-radius: 8px;
      font-size: 12px;
      margin-top: 10px;
      display: none;
    }

    .error.show {
      display: block;
    }

    .settings {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .settings-label {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    .settings-input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #e2e8f0;
      font-size: 12px;
      margin-bottom: 10px;
    }

    .settings-input:focus {
      outline: none;
      border-color: #06b6d4;
    }

    .footer {
      text-align: center;
      padding: 15px;
      font-size: 11px;
      color: #64748b;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🧠 Deep Lynctus</h1>
    <p>Code Quality Analyzer</p>
  </div>

  <div class="container">
    <div class="status">
      <div class="status-header">
        <div class="status-icon" id="statusIcon">🔍</div>
        <div class="status-text">
          <h3 id="statusTitle">GitHub Repository Detected</h3>
          <p id="statusDesc">Ready to analyze code quality</p>
        </div>
      </div>
    </div>

    <div class="repo-url" id="repoUrl">
      Loading repository...
    </div>

    <button class="btn btn-primary" id="analyzeBtn">
      🚀 Analyze Repository
    </button>

    <button class="btn btn-secondary" id="viewDashboardBtn">
      📊 View Dashboard
    </button>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Analyzing repository...</p>
      <p style="font-size: 11px; color: #64748b; margin-top: 8px;">This may take 1-2 minutes</p>
    </div>

    <div class="error" id="error"></div>

    <div class="results" id="results">
      <div class="metric-grid">
        <div class="metric-card">
          <div class="metric-label">Quality Score</div>
          <div class="metric-value" id="qualityScore">--</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Total Files</div>
          <div class="metric-value" id="totalFiles" style="color: #8b5cf6;">--</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Critical Issues</div>
          <div class="metric-value" id="criticalIssues" style="color: #ef4444;">--</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">High Issues</div>
          <div class="metric-value" id="highIssues" style="color: #f97316;">--</div>
        </div>
      </div>

      <button class="btn btn-primary" id="viewDetailsBtn">
        View Full Report →
      </button>
    </div>

    <div class="settings">
      <div class="settings-label">Backend API URL</div>
      <input
        type="text"
        class="settings-input"
        id="apiUrl"
        placeholder="http://localhost:8000"
        value="http://localhost:8000"
      >
      <button class="btn btn-secondary" id="saveSettingsBtn" style="font-size: 12px; padding: 8px;">
        Save Settings
      </button>
    </div>
  </div>

  <div class="footer">
    Deep Lynctus v1.0.0 • AI-Powered Analysis
  </div>

  <script src="popup.js"></script>
</body>
</html>
