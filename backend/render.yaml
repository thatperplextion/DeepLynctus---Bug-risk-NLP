# Render.com deployment configuration for DeepLynctus backend
# Configures Python runtime environment and build settings

services:
  - type: web
    name: bug-risk-nlp-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6
