# Render.com deployment configuration for DeepLynctus frontend
# Configures Node.js build environment and static site deployment

services:
  - type: static
    name: bug-risk-nlp-frontend
    buildCommand: npm install && npx vite build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: VITE_API_URL
        value: https://deeplynctus-bug-risk-nlp.onrender.com
